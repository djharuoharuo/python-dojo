# =====================================================================
# deploy-gas.yml — GAS（バックエンド）の自動デプロイ。
# gas/ に変更があり main へ push/マージされたら clasp push → 既存デプロイの
# 更新（Web AppのURLは変えない）まで自動実行する。
#
# 前提（README「GAS自動デプロイのセットアップ」参照）:
#   Secrets に CLASP_CREDENTIALS / GAS_SCRIPT_ID / GAS_DEPLOYMENT_ID を登録すること。
#   未登録でもエラーにはなるが、PCから手動で `clasp push` する従来手順は常に有効
#   （このActionはあくまで追加の自動化であり、必須ではない）。
#
# セキュリティ注記（§9拡張）:
#   CLASP_CREDENTIALS は APP_TOKEN より強い権限（GASプロジェクトの書き換え）を持つ。
#   漏洩時は Googleアカウント → セキュリティ → サードパーティのアクセス でこのアプリの
#   アクセス権を取り消し、`clasp login` し直してSecretsを再登録すること。
# =====================================================================
name: Deploy GAS backend

on:
  push:
    branches: [main]
    paths: ['gas/**']
  workflow_dispatch:

concurrency:
  group: gas-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clasp認証情報を復元
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
          GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
        run: |
          if [ -z "$CLASP_CREDENTIALS" ] || [ -z "$GAS_SCRIPT_ID" ]; then
            echo "::error::Secrets CLASP_CREDENTIALS / GAS_SCRIPT_ID が未設定です。READMEの「GAS自動デプロイのセットアップ」を参照してください"
            exit 1
          fi
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json
          # scriptId に紛れ込んだ空白・改行を除去（コピペ事故対策）。残っていると
          # GET /v1/projects/{scriptId}/content が 400「invalid argument」で落ちる
          SCRIPT_ID=$(printf '%s' "$GAS_SCRIPT_ID" | tr -d '[:space:]')
          echo "scriptId length (trimmed): ${#SCRIPT_ID}"  # 値は出さず長さだけ（正常なら通常57）
          # .clasp.json は gas/ 直下に置き、clasp系コマンドも working-directory: gas で実行するため
          # rootDir は「.」（.clasp.json自身と同じ階層）。"gas"にすると gas/gas/ を探しに行き失敗する
          printf '{"scriptId":"%s","rootDir":"."}\n' "$SCRIPT_ID" > gas/.clasp.json

      - run: npm install -g @google/clasp

      # 注意: DEBUG=clasp:* は認証トークン全文をログに出力するため絶対に付けない（§9）
      - name: clasp push（ソースをGASプロジェクトへ反映）
        run: clasp push -f
        working-directory: gas

      - name: clasp deploy（既存デプロイを更新。URL固定）
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          if [ -z "$GAS_DEPLOYMENT_ID" ]; then
            echo "::warning::GAS_DEPLOYMENT_ID が未設定のため push のみ実行しました。GASエディタの既存デプロイには反映されていません。READMEを参照しSecretsを追加してください"
            exit 0
          fi
          # コピペ事故対策で前後の空白・改行を除去。デプロイIDは GAS_URL の /macros/s/ と /exec の間の文字列
          DEP_ID=$(printf '%s' "$GAS_DEPLOYMENT_ID" | tr -d '[:space:]')
          echo "deployment id length: ${#DEP_ID}"  # 値は出さず長さだけ（AKfyc… で概ね57〜72文字）
          # clasp deploy は「Invalid deployment ID」でも exit 0 を返すことがあるため、出力を検査して
          # 確実に失敗させる（本番URL=あなたのアプリが叩くURLが更新されない事故を黙って見逃さないため §14）
          out=$(clasp deploy -i "$DEP_ID" -d "auto: ${GITHUB_SHA}" 2>&1) || true
          echo "$out"
          if echo "$out" | grep -qiE 'invalid deployment|not found|error'; then
            echo "::error::clasp deploy に失敗しました。GAS_DEPLOYMENT_ID を確認してください（GAS_URL の https://script.google.com/macros/s/【ここ】/exec の【ここ】と一致する必要があります）"
            exit 1
          fi
        working-directory: gas
